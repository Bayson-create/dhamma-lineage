<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>我的账号 · 法义溯源</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="account.css">
</head>
<body>
<header>
  <h1>法义溯源 <span class="sub">Dhamma Lineage</span></h1>
</header>

<main class="account-main">
  <div class="account-card">
    <h2>我的账号</h2>
    <p id="accountEmail" class="account-email"></p>

    <div id="quotaBox" class="quota-box">
      <p>加载中…</p>
    </div>

    <button id="logoutBtn" class="logout-btn">退出登录</button>
  </div>

  <div id="adminCard" class="account-card" hidden>
    <h2>管理员：分配额度</h2>
    <form id="grantForm" class="account-form">
      <label>用户邮箱<input id="grantEmail" type="email" required></label>
      <label>充值金额（元）<input id="grantAmount" type="number" min="0.01" step="0.01" required></label>
      <button type="submit">充值</button>
      <p id="grantMsg" class="form-msg"></p>
    </form>
  </div>
</main>

<footer>
  <p><a href="index.html">← 返回首页</a> · <a href="trace.html">法义溯源</a></p>
</footer>

<script src="auth.js"></script>
<script src="account.js"></script>
</body>
</html>
